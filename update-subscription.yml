name: Update private subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-private-subscription
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SOURCE_URLS: ${{ secrets.SOURCE_URLS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Build subscription
        run: python collector.py

      - name: Commit changed output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "subscription-bot"
          git config user.email "subscription-bot@users.noreply.github.com"
          git add sub.txt metadata.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update subscription $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
